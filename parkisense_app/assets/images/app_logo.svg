<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B4D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#48CAE4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad1)" />
  
  <!-- Sound Wave Pattern -->
  <g transform="translate(256, 256)">
    <path d="M-80,-60 Q-40,-100 0,-60 Q40,-100 80,-60" stroke="white" stroke-width="8" fill="none" opacity="0.9"/>
    <path d="M-80,-20 Q-40,-60 0,-20 Q40,-60 80,-20" stroke="white" stroke-width="8" fill="none" opacity="0.9"/>
    <path d="M-80,20 Q-40,-20 0,20 Q40,-20 80,20" stroke="white" stroke-width="8" fill="none" opacity="0.9"/>
    <path d="M-80,60 Q-40,20 0,60 Q40,20 80,60" stroke="white" stroke-width="8" fill="none" opacity="0.9"/>
  </g>
  
  <!-- Microphone Icon -->
  <g transform="translate(256, 256)">
    <rect x="-30" y="-70" width="60" height="100" rx="30" fill="white" />
    <rect x="-15" y="40" width="30" height="40" fill="white" />
    <rect x="-40" y="70" width="80" height="15" rx="5" fill="white" />
    <line x1="0" y1="80" x2="0" y2="95" stroke="white" stroke-width="8" />
  </g>
  
  <!-- Brain/Neural Pattern (Subtle) -->
  <g transform="translate(256, 256)" opacity="0.3">
    <circle cx="-120" cy="-80" r="15" fill="white" />
    <circle cx="120" cy="-80" r="15" fill="white" />
    <circle cx="-120" cy="80" r="15" fill="white" />
    <circle cx="120" cy="80" r="15" fill="white" />
    <line x1="-120" y1="-80" x2="-80" y2="-40" stroke="white" stroke-width="3" />
    <line x1="120" y1="-80" x2="80" y2="-40" stroke="white" stroke-width="3" />
    <line x1="-120" y1="80" x2="-80" y2="40" stroke="white" stroke-width="3" />
    <line x1="120" y1="80" x2="80" y2="40" stroke="white" stroke-width="3" />
  </g>
  
  <!-- Text "PS" -->
  <text x="256" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="white">PS</text>
</svg>
